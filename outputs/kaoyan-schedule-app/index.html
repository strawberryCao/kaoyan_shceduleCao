<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="考研学习课表 App，支持 30 天计划、完成统计、备注、导入导出。"
    />
    <link rel="stylesheet" href="/learning-math.css" />
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const isLearningCenter = params.get('panel') === 'learning'
          && !['wallpaper', 'console', 'notes', 'noteApp', 'hub', 'aiConfig']
            .some((key) => params.get(key) === '1');
        if (!isLearningCenter) return;
        const script = document.createElement('script');
        script.defer = true;
        script.src = '/learning-math.js';
        document.head.appendChild(script);
      })();
    </script>
    <title>考研学习课表</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
