<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f1ec" />
  <title>缸号助手</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">缸</span>
        <div><strong>缸号助手</strong><small id="key-status">尚未配置</small></div>
      </div>
      <button id="open-settings" class="icon-button" title="设置" aria-label="打开设置">⚙</button>
    </header>

    <main class="main-view">
      <section id="drop-zone" class="drop-zone" tabindex="0">
        <div class="drop-symbol" aria-hidden="true"><span></span><span></span></div>
        <h1>把图片拖到这里</h1>
        <p>松开后自动识别并整理</p>
        <button id="select-images" class="primary-button">选择图片</button>
        <p class="drop-note">支持 JPG、PNG、WEBP、BMP</p>
      </section>

      <section id="progress-view" class="progress-view hidden" aria-live="polite">
        <div class="progress-heading"><div><small>正在整理</small><strong id="progress-title">0 张图片</strong></div><span id="progress-count">0 / 0</span></div>
        <div class="progress-track"><div id="progress-bar"></div></div>
        <p id="progress-message">正在读取图片…</p>
        <button id="stop" class="text-button">处理完当前图片后暂停</button>
      </section>

      <section id="result-view" class="result-view hidden">
        <div class="result-heading"><div><small>本次处理完成</small><h1 id="result-title">已整理 0 张图片</h1></div><button id="new-task" class="secondary-button">继续添加</button></div>
        <div class="summary-strip">
          <button class="summary-item complete" data-filter="complete"><strong id="stat-auto">0</strong><span>已完成</span></button>
          <button class="summary-item review" data-filter="review"><strong id="stat-manual">0</strong><span>待确认</span></button>
          <button class="summary-item unreadable" data-filter="unreadable"><strong id="stat-failed">0</strong><span>无法识别</span></button>
        </div>
        <div id="review-list" class="review-list"></div>
        <div class="result-footer">
          <button id="open-output" class="primary-button">查看整理结果</button>
          <button id="undo" class="text-button">撤销本次整理</button>
        </div>
      </section>
    </main>

    <aside id="settings-drawer" class="settings-drawer" aria-hidden="true">
      <div class="drawer-backdrop" data-close-settings></div>
      <div class="drawer-panel">
        <header><div><small>偏好设置</small><h2>缸号助手</h2></div><button class="icon-button" data-close-settings aria-label="关闭">×</button></header>
        <div class="drawer-scroll">
          <section class="settings-section">
            <h3>文件整理</h3>
            <label>输出位置<div class="field-action"><input id="output-path" readonly placeholder="默认：图片旁的“缸号整理结果”" /><button id="select-output">选择</button></div></label>
            <label>文件名格式<input id="filename-template" value="{{缸号}}_{{序号}}" /></label>
            <p class="field-help">可用：{{缸号}}、{{序号}}、{{日期}}、{{原文件名}}、{{批次}}</p>
            <div class="field-grid"><label>序号起始<input id="sequence-start" type="number" value="1" /></label><label>序号位数<input id="sequence-digits" type="number" value="3" /></label></div>
            <label>批次名称<input id="batch-name" placeholder="可不填" /></label>
          </section>

          <section class="settings-section">
            <div class="section-title"><h3>AI 服务</h3><span id="key-badge" class="state-badge">未配置</span></div>
            <label>API Key<div class="field-action"><input id="api-key" type="password" placeholder="只保存在本机系统凭据库" /><button id="save-key">保存</button></div></label>
            <label>API 地址<input id="base-url" value="https://dashscope.aliyuncs.com/compatible-mode/v1" /></label>
            <label>识别模型<input id="first-model" value="qwen3.7-plus" /></label>
            <label>复核模型<input id="review-model" value="qwen-vl-ocr" /></label>
            <div class="button-row"><button id="test-api" class="secondary-button">测试连接</button><button id="clear-key" class="text-button danger">清除 Key</button></div>
          </section>

          <details class="settings-section advanced-settings">
            <summary>高级设置</summary>
            <div class="advanced-body">
              <label>加强复核模型<input id="strict-model" value="qwen3.7-plus" /></label>
              <label>缸号格式<input id="number-pattern" value="^[A-Z0-9]+(?:-[A-Z0-9]+)*$" /></label>
              <div class="field-grid"><label>统一分隔符<input id="separator" value="-" /></label><label>数字补齐<input id="number-padding" type="number" value="0" /></label></div>
              <label class="toggle-line"><input id="uppercase" type="checkbox" checked /><span>字母统一大写</span></label>
              <label class="toggle-line"><input id="remove-spaces" type="checkbox" checked /><span>自动移除空格</span></label>
              <div class="field-grid"><label>Temperature<input id="temperature" type="number" step="0.05" value="0.05" /></label><label>最大 Token<input id="max-tokens" type="number" value="800" /></label></div>
              <div class="field-grid"><label>超时（秒）<input id="timeout" type="number" value="90" /></label><label>图片最长边<input id="max-dimension" type="number" value="2048" /></label></div>
              <label>首次识别提示词<textarea id="first-prompt" rows="5"></textarea></label>
              <label>复核提示词<textarea id="review-prompt" rows="5"></textarea></label>
              <label>加强复核提示词<textarea id="strict-prompt" rows="5"></textarea></label>
              <button id="restore-prompts" class="secondary-button">恢复默认提示词</button>
            </div>
          </details>
        </div>
      </div>
    </aside>

    <dialog id="preview-dialog"><button id="close-preview" class="dialog-close">×</button><img id="preview-image" alt="图片预览" /><p id="preview-loading">正在读取图片…</p></dialog>
    <input id="config-file" type="file" accept="application/json" hidden />
    <div id="toast" class="toast" role="status"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
