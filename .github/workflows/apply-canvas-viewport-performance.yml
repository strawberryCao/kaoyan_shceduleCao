    const nextZoom = applyZoomToDom(pending.zoom);
    const maxLeft = Math.max(0, WORLD_WIDTH * nextZoom - viewport.clientWidth);
    const maxTop = Math.max(0, WORLD_HEIGHT * nextZoom - viewport.clientHeight);
