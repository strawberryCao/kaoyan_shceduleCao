name: Apply canvas viewport performance patch

on:
  push:
    branches:
      - fix/learning-detail-title-latex
    paths:
      - .github/workflows/apply-canvas-viewport-performance.yml

permissions:
  contents: write

concurrency:
  group: canvas-viewport-performance-patch
  cancel-in-progress: false

jobs:
  patch-build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0

      - name: Apply narrowly scoped viewport optimizations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('outputs/kaoyan-schedule-app/src/components/CanvasWorkspace.tsx')
          text = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              "const PALM_REJECTION_MS = 700;\n",
              "const PALM_REJECTION_MS = 700;\nconst VIEWPORT_PERSIST_DELAY_MS = 180;\nconst WHEEL_ZOOM_SETTLE_MS = 120;\n",
              'viewport timing constants',
          )

          replace_once(
              """      velocityX: number;
      velocityY: number;
    };

export interface CanvasPreviewOptions {
""",
