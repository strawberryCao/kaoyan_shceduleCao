name: Run canvas viewport performance patch

on:
  push:
    branches:
      - fix/learning-detail-title-latex
  pull_request:
    branches:
      - fix/learning-detail-title-latex
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: canvas-viewport-performance-runner
  cancel-in-progress: false

jobs:
  patch-build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0

      - name: Extract and run validated patch script
        shell: bash
        run: |
          python3 - <<'PATCH_INITIAL'
          from pathlib import Path
          import re

          path = Path('outputs/kaoyan-schedule-app/src/components/CanvasWorkspace.tsx')
          text = path.read_text(encoding='utf-8').replace('\r\n', '\n')
          pattern = re.compile(
              r"  const storageKey = draftKey === false \? null : draftKey;\n"
              r"  const initialIdRef = useRef\(initialDocument\?\.id \?\? null\);\n"
              r"  const makeInitialDocument = \(\) => \{\n.*?\n  \};\n\n"
              r"  const \[documentState",
              re.DOTALL,
          )
          replacement = """  const storageKey = draftKey === false ? null : draftKey;
          const viewportStorageKey = storageKey ? `${storageKey}.viewport` : null;
          const initialIdRef = useRef(initialDocument?.id ?? null);
          const restoreStoredViewport = (document: CanvasDocument): CanvasDocument => {
            if (!viewportStorageKey || typeof localStorage === 'undefined') return document;
            try {
              const saved = localStorage.getItem(viewportStorageKey);
              if (!saved) return document;
              const parsed = JSON.parse(saved) as Partial<CanvasDocument['viewport']>;
              const savedZoom = Number(parsed.zoom);
              const savedScrollLeft = Number(parsed.scrollLeft);
              const savedScrollTop = Number(parsed.scrollTop);
              if (
                Number.isFinite(savedZoom)
                && Number.isFinite(savedScrollLeft)
                && Number.isFinite(savedScrollTop)
              ) {
                document.viewport = {
                  zoom: clamp(savedZoom, MIN_ZOOM, MAX_ZOOM),
                  scrollLeft: Math.max(0, savedScrollLeft),
                  scrollTop: Math.max(0, savedScrollTop),
                };
              }
            } catch {
              // Viewport state is optional; an invalid lightweight snapshot is ignored.
            }
            return document;
          };
          const makeInitialDocument = () => {
            if (storageKey && typeof localStorage !== 'undefined') {
              try {
                const saved = localStorage.getItem(storageKey);
                if (saved) {
                  const draft = parseCanvasDocument(saved);
                  const draftIsNewer = !initialDocument
                    || (
                      draft.id === initialDocument.id
                      && draft.syncRevision === initialDocument.syncRevision
                      && draft.updatedAt !== initialDocument.updatedAt
                    );
                  if (draftIsNewer) return restoreStoredViewport(draft);
                }
              } catch {
                // A malformed or over-quota draft should never prevent opening the editor.
              }
            }
            if (initialDocument) return restoreStoredViewport(cloneCanvasDocument(initialDocument));
            return restoreStoredViewport(createEmptyCanvasDocument());
          };

          const [documentState"""
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'lightweight viewport restore regex: expected one match, found {count}')
          path.write_text(text, encoding='utf-8')
          PATCH_INITIAL

          python3 - <<'EXTRACT'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-canvas-viewport-performance.yml').read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          label_position = script.index("'lightweight viewport restore'")
          call_start = script.rfind('\nreplace_once(', 0, label_position) + 1
          call_end = script.index('\n)\n', label_position) + 3
          script = script[:call_start] + script[call_end:]
          Path('/tmp/apply_canvas_viewport_performance.py').write_text(script, encoding='utf-8')
          EXTRACT
          if ! python3 /tmp/apply_canvas_viewport_performance.py > /tmp/canvas-patch.log 2>&1; then
            cat /tmp/canvas-patch.log
            exit 1
          fi

      - name: Upload patch failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-patch-failure
          path: /tmp/canvas-patch.log
          if-no-files-found: ignore

      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Type-check and build
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Commit validated optimization and remove temporary runner
        shell: bash
        run: |
          rm -f .github/workflows/apply-canvas-viewport-performance.yml
          rm -f .github/workflows/run-canvas-viewport-performance.yml
          rm -f .github/canvas-viewport-performance.trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/kaoyan-schedule-app/src/components/CanvasWorkspace.tsx .github
          git commit -m "perf: smooth canvas viewport interactions"
          git push origin HEAD:fix/learning-detail-title-latex
