name: Run canvas viewport performance patch

on:
  push:
    branches:
      - fix/learning-detail-title-latex
  pull_request:
    branches:
      - fix/learning-detail-title-latex
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: canvas-viewport-performance-runner
  cancel-in-progress: false

jobs:
  patch-build-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0

      - name: Extract and run validated patch script
        shell: bash
        run: |
          python3 - <<'PATCH_BLOCKS'
          from pathlib import Path
          import re

          path = Path('outputs/kaoyan-schedule-app/src/components/CanvasWorkspace.tsx')
          text = path.read_text(encoding='utf-8').replace('\r\n', '\n')

          initial_pattern = re.compile(
              r"  const storageKey = draftKey === false \? null : draftKey;\n"
              r"  const initialIdRef = useRef\(initialDocument\?\.id \?\? null\);\n"
              r"  const makeInitialDocument = \(\) => \{\n.*?\n  \};\n\n"
              r"  const \[documentState",
              re.DOTALL,
          )
          initial_replacement = """  const storageKey = draftKey === false ? null : draftKey;
          const viewportStorageKey = storageKey ? `${storageKey}.viewport` : null;
          const initialIdRef = useRef(initialDocument?.id ?? null);
          const restoreStoredViewport = (document: CanvasDocument): CanvasDocument => {
            if (!viewportStorageKey || typeof localStorage === 'undefined') return document;
            try {
              const saved = localStorage.getItem(viewportStorageKey);
              if (!saved) return document;
              const parsed = JSON.parse(saved) as Partial<CanvasDocument['viewport']>;
              const savedZoom = Number(parsed.zoom);
              const savedScrollLeft = Number(parsed.scrollLeft);
              const savedScrollTop = Number(parsed.scrollTop);
              if (
                Number.isFinite(savedZoom)
                && Number.isFinite(savedScrollLeft)
                && Number.isFinite(savedScrollTop)
              ) {
                document.viewport = {
                  zoom: clamp(savedZoom, MIN_ZOOM, MAX_ZOOM),
                  scrollLeft: Math.max(0, savedScrollLeft),
                  scrollTop: Math.max(0, savedScrollTop),
                };
              }
            } catch {
              // Viewport state is optional; an invalid lightweight snapshot is ignored.
            }
            return document;
          };
          const makeInitialDocument = () => {
            if (storageKey && typeof localStorage !== 'undefined') {
              try {
                const saved = localStorage.getItem(storageKey);
                if (saved) {
                  const draft = parseCanvasDocument(saved);
                  const draftIsNewer = !initialDocument
                    || (
                      draft.id === initialDocument.id
                      && draft.syncRevision === initialDocument.syncRevision
                      && draft.updatedAt !== initialDocument.updatedAt
                    );
                  if (draftIsNewer) return restoreStoredViewport(draft);
                }
              } catch {
                // A malformed or over-quota draft should never prevent opening the editor.
              }
            }
            if (initialDocument) return restoreStoredViewport(cloneCanvasDocument(initialDocument));
            return restoreStoredViewport(createEmptyCanvasDocument());
          };

          const [documentState"""
          text, count = initial_pattern.subn(initial_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'lightweight viewport restore regex: expected one match, found {count}')

          wheel_pattern = re.compile(
              r"  const handleViewportWheel = useCallback\(\(event: WheelEvent\) => \{\n.*?\n"
              r"  \}, \[setCurrentDocument, zoom\]\);\n",
              re.DOTALL,
          )
          wheel_replacement = """  const applyPendingWheelZoom = useCallback(() => {
            wheelZoomFrameRef.current = null;
            const pending = pendingWheelZoomRef.current;
            pendingWheelZoomRef.current = null;
            const viewport = viewportRef.current;
            if (!pending || !viewport) return;
            const nextZoom = applyZoomToDom(pending.zoom);
            const maxLeft = Math.max(0, WORLD_WIDTH * nextZoom - viewport.clientWidth);
            const maxTop = Math.max(0, WORLD_HEIGHT * nextZoom - viewport.clientHeight);
            viewport.scrollTo({
              left: clamp(pending.anchorWorld.x * nextZoom - pending.pointerX, 0, maxLeft),
              top: clamp(pending.anchorWorld.y * nextZoom - pending.pointerY, 0, maxTop),
            });
            documentRef.current.viewport.scrollLeft = viewport.scrollLeft;
            documentRef.current.viewport.scrollTop = viewport.scrollTop;
          }, [applyZoomToDom]);

          const settleWheelZoom = useCallback(() => {
            if (wheelZoomFrameRef.current !== null) {
              cancelAnimationFrame(wheelZoomFrameRef.current);
              wheelZoomFrameRef.current = null;
            }
            if (pendingWheelZoomRef.current) applyPendingWheelZoom();
            const viewport = viewportRef.current;
            if (!viewport) return;
            const settledZoom = clamp(zoomRef.current, MIN_ZOOM, MAX_ZOOM);
            setZoomState(settledZoom);
            writeViewportSnapshot();
            setStatus(`画布缩放 ${Math.round(settledZoom * 100)}% · 已阻止浏览器页面缩放`);
          }, [applyPendingWheelZoom, writeViewportSnapshot]);

          const handleViewportWheel = useCallback((event: WheelEvent) => {
            const viewport = viewportRef.current;
            if (!viewport) return;
            const target = event.target instanceof Element ? event.target : null;
            if (target?.closest('textarea, input, select, .cw-directory')) return;
            if (event.ctrlKey || event.metaKey) {
              event.preventDefault();
              event.stopPropagation();
              const rect = viewport.getBoundingClientRect();
              const pointerX = event.clientX - rect.left;
              const pointerY = event.clientY - rect.top;
              const renderedZoom = clamp(zoomRef.current, MIN_ZOOM, MAX_ZOOM);
              const baseZoom = pendingWheelZoomRef.current?.zoom ?? renderedZoom;
              const nextZoom = clamp(baseZoom * Math.exp(-event.deltaY * 0.0018), MIN_ZOOM, MAX_ZOOM);
              if (Math.abs(nextZoom - baseZoom) < 0.0001) return;
              pendingWheelZoomRef.current = {
                zoom: nextZoom,
                anchorWorld: {
                  x: (viewport.scrollLeft + pointerX) / renderedZoom,
                  y: (viewport.scrollTop + pointerY) / renderedZoom,
                },
                pointerX,
                pointerY,
              };
              if (wheelZoomFrameRef.current === null) {
                wheelZoomFrameRef.current = requestAnimationFrame(applyPendingWheelZoom);
              }
              if (wheelZoomSettleTimerRef.current !== null) {
                window.clearTimeout(wheelZoomSettleTimerRef.current);
              }
              wheelZoomSettleTimerRef.current = window.setTimeout(() => {
                wheelZoomSettleTimerRef.current = null;
                settleWheelZoom();
              }, WHEEL_ZOOM_SETTLE_MS);
              return;
            }
            if (pendingWheelZoomRef.current || wheelZoomFrameRef.current !== null) {
              if (wheelZoomSettleTimerRef.current !== null) {
                window.clearTimeout(wheelZoomSettleTimerRef.current);
                wheelZoomSettleTimerRef.current = null;
              }
              settleWheelZoom();
            }
            event.preventDefault();
            const horizontal = event.shiftKey ? event.deltaY : event.deltaX;
            const vertical = event.shiftKey ? 0 : event.deltaY;
            viewport.scrollBy({ left: horizontal, top: vertical });
            documentRef.current.viewport.scrollLeft = viewport.scrollLeft;
            documentRef.current.viewport.scrollTop = viewport.scrollTop;
            scheduleViewportPersistence();
          }, [applyPendingWheelZoom, scheduleViewportPersistence, settleWheelZoom]);
          """
          text, count = wheel_pattern.subn(wheel_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'frame-coalesced wheel zoom regex: expected one match, found {count}')

          text, count = re.subn(
              r'<span className="cw-zoom-value">',
              '<span ref={zoomValueRef} className="cw-zoom-value">',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'live zoom value ref regex: expected one match, found {count}')

          scroll_pattern = re.compile(
              r"(          onScroll=\{\(event\) => \{\n"
              r"            documentRef\.current\.viewport\.scrollLeft = event\.currentTarget\.scrollLeft;\n"
              r"            documentRef\.current\.viewport\.scrollTop = event\.currentTarget\.scrollTop;\n)"
              r"            draftRevisionRef\.current \+= 1;"
          )
          text, count = scroll_pattern.subn(r"\1            scheduleViewportPersistence();", text, count=1)
          if count != 1:
              raise SystemExit(f'lightweight scroll persistence regex: expected one match, found {count}')

          path.write_text(text, encoding='utf-8')
          PATCH_BLOCKS

          python3 - <<'EXTRACT'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-canvas-viewport-performance.yml').read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          for label in (
              "'lightweight viewport restore'",
              "'frame-coalesced wheel zoom'",
              "'live zoom value ref'",
              "'lightweight scroll persistence'",
          ):
              label_position = script.index(label)
              call_start = script.rfind('\nreplace_once(', 0, label_position) + 1
              call_end = script.index('\n)\n', label_position) + 3
              script = script[:call_start] + script[call_end:]
          Path('/tmp/apply_canvas_viewport_performance.py').write_text(script, encoding='utf-8')
          EXTRACT
          if ! python3 /tmp/apply_canvas_viewport_performance.py > /tmp/canvas-patch.log 2>&1; then
            cat /tmp/canvas-patch.log
            exit 1
          fi

      - name: Upload patch failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-patch-failure
          path: /tmp/canvas-patch.log
          if-no-files-found: ignore

      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Type-check and build
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Commit validated optimization and remove temporary runner
        shell: bash
        run: |
          rm -f .github/workflows/apply-canvas-viewport-performance.yml
          rm -f .github/workflows/run-canvas-viewport-performance.yml
          rm -f .github/canvas-viewport-performance.trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/kaoyan-schedule-app/src/components/CanvasWorkspace.tsx .github
          git commit -m "perf: smooth canvas viewport interactions"
          git push origin HEAD:fix/learning-detail-title-latex
