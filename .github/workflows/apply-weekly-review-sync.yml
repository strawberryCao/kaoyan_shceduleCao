.ai-review-sync-panel > header > div {
  display: grid;
  gap: 4px;
}

.ai-review-sync-panel > header span {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: #315f72;
  font-size: 12px;
  font-weight: 900;
}

.ai-review-sync-panel > header small,
.ai-review-actions small {
  color: #7f8992;
  font-size: 10px;
  line-height: 1.5;
}

.ai-review-public-warning {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  border-radius: 9px;
  background: #fff3df;
  color: #865b24;
  padding: 10px 12px;
  font-size: 11px;
  line-height: 1.55;
}

.ai-review-public-warning svg { flex: 0 0 auto; margin-top: 1px; }

.ai-review-status-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.ai-review-status-grid > div {
  min-width: 0;
  display: grid;
  gap: 3px;
  border: 1px solid #e3e7ea;
  border-radius: 9px;
  background: #fff;
  padding: 10px;
}

.ai-review-status-grid small { color: #87909a; font-size: 9px; }
.ai-review-status-grid strong { overflow-wrap: anywhere; color: #46535f; font-size: 11px; }

.ai-review-last-error {
  margin: 0;
  border-radius: 8px;
  background: #fff0ed;
  color: #a0483e;
  padding: 9px 11px;
  font-size: 10px;
  line-height: 1.5;
}

.ai-review-actions {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.ai-review-actions button:first-child {
  border-color: #315f72;
  background: #315f72;
  color: #fff;
}

@media (max-width: 760px) {
  .ai-review-sync-panel > header { align-items: stretch; flex-direction: column; }
  .ai-review-status-grid { grid-template-columns: minmax(0, 1fr); }
  .ai-path-parameter > div { grid-template-columns: minmax(0, 1fr); }
}
"""
          save(p, text)

          # Convenience scripts only; no package dependencies changed.
          p, text = load('package.json')
          text = replace_once(text,
              "    \"notes:index:preview\": \"node scripts/rebuild-note-index.cjs\",\n",
              "    \"notes:index:preview\": \"node scripts/rebuild-note-index.cjs\",\n    \"review:push\": \"node scripts/review-github-sync.cjs push\",\n    \"review:pull\": \"node scripts/review-github-sync.cjs pull\",\n    \"review:status\": \"node scripts/review-github-sync.cjs status\",\n",
              'review package scripts')
          save(p, text)
          PY

      - name: Syntax checks
        working-directory: outputs/kaoyan-schedule-app
        run: |
          node --check scripts/ai-router.cjs
          node --check scripts/review-github-sync.cjs
          node --check scripts/note-server.cjs

      - name: Validate confirmed-only exporter
        working-directory: outputs/kaoyan-schedule-app
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const { exportReviewData, currentScheduleKey } = require('./scripts/review-github-sync.cjs');
          const root = fs.mkdtempSync(path.join(os.tmpdir(), 'review-export-'));
          fs.mkdirSync(path.join(root, 'data'), { recursive: true });
          fs.mkdirSync(path.join(root, 'config'), { recursive: true });
          const snapshot = { revision: 7, days: { '2026-07-21': { autoNotes: [
            { noteUid: 'm1', noteType: 'mistake', organizationStatus: 'confirmed', title: '错题', subject: '数学', filePath: '' },
            { noteUid: 'r1', noteType: 'memory', organizationStatus: 'confirmed', title: '背诵', subject: '408', filePath: '' },
            { noteUid: 'x1', noteType: 'mistake', organizationStatus: 'pending', title: '不能导出', subject: '数学', filePath: '' },
            { noteUid: 'x2', noteType: 'note', organizationStatus: 'confirmed', title: '不能导出', subject: '数学', filePath: '' },
          ] } } };
          const settings = { scheduleDay: 'sunday', scheduleHour: 21, mergeSameQuestion: true, groupSimilarTopics: true, maxGroupSize: 8, includeOriginalImages: true, aiEnabled: true };
          const notes = exportReviewData({ learningSnapshot: snapshot, repositoryRoot: root, settings, aiConfig: { providerId: '', modelId: '', baseUrl: '' } });
          if (notes.length !== 2 || notes.some((note) => !['m1', 'r1'].includes(note.id))) throw new Error('Exporter included an unconfirmed or unrelated note');
          if (!/^\d{4}-\d{2}-\d{2}@21$/.test(currentScheduleKey({ scheduleDay: 'sunday', scheduleHour: 21 }))) throw new Error('Invalid weekly schedule key');
          fs.rmSync(root, { recursive: true, force: true });
          NODE

      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Type-check and build
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Commit validated feature and remove one-time workflow
        shell: bash
        run: |
          rm -f .github/workflows/apply-weekly-review-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/kaoyan-schedule-app .github/workflows/apply-weekly-review-sync.yml
          git commit -m "feat: sync confirmed review notes and PDFs via GitHub"
          git push origin HEAD:feat/weekly-review-pdf-sync
