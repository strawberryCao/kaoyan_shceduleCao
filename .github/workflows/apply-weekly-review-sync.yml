name: Apply weekly review PDF sync

on:
  pull_request:
    branches:
      - feat/weekly-review-pdf-sync
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-weekly-review-pdf-sync
  cancel-in-progress: false

jobs:
  patch-build-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-review-pdf-sync
          fetch-depth: 0

      - name: Apply narrowly scoped review integration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('outputs/kaoyan-schedule-app')

          def load(path):
              p = root / path
              return p, p.read_text(encoding='utf-8').replace('\r\n', '\n')

          def save(p, text):
              p.write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          # AI router task profile, parameters, task definition and string/path normalization.
          p, text = load('scripts/ai-router.cjs')
          text = replace_once(text,
