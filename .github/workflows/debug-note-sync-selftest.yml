name: Debug note sync self-test

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    paths:
      - .github/workflows/debug-note-sync-selftest.yml

permissions:
  contents: read

jobs:
  selftest:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Download runtime script
        shell: powershell
        run: |
          $url = 'https://raw.githubusercontent.com/strawberryCao/kaoyan_shceduleCao/fix/learning-detail-title-latex/outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1?v=debug-selftest'
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile "$env:RUNNER_TEMP\windows-note-folder-sync.ps1"
      - name: Run self-test with full output
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File "$env:RUNNER_TEMP\windows-note-folder-sync.ps1" -NativeCommandSelfTest
