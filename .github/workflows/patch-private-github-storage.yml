name: Apply private GitHub storage compatibility

on:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - 'outputs/kaoyan-schedule-app/scripts/patch-private-github-storage.cjs'
      - '.github/workflows/patch-private-github-storage.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch GitHub storage reads
        working-directory: outputs/kaoyan-schedule-app
        run: node scripts/patch-private-github-storage.cjs
      - name: Commit patched storage
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add outputs/kaoyan-schedule-app/cloudflare/github-store.js
          git commit -m 'security: support private GitHub data repository reads'
          git push origin HEAD:fix/learning-detail-title-latex
