name: Validate Windows note sync

on:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1
      - outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1
      - .github/workflows/validate-windows-note-sync.yml
  pull_request:
    branches: [fix/learning-detail-title-latex]
    paths:
      - outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1
      - outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1
      - .github/workflows/validate-windows-note-sync.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-windows-powershell:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Parse scripts with Windows PowerShell 5.1
        shell: powershell
        run: |
          $scripts = @(
            'outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1',
            'outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1'
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error ("{0}: {1}" -f $script, $_.Message) }
              exit 1
            }
            Write-Host "Windows PowerShell parse OK: $script"
          }
      - name: Reproduce successful native Git stderr
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1 -NativeCommandSelfTest
      - name: Exercise uninstall path safely
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1 -Uninstall

# Final validation trigger after Git stderr and uninstall compatibility fixes.
