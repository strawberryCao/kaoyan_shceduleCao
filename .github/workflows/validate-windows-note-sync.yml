name: Validate Windows note sync

# Temporary PRs may touch this file only to trigger the Windows validation job.
on:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1
      - outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1
      - .github/workflows/validate-windows-note-sync.yml
  pull_request:
    branches: [fix/learning-detail-title-latex]
    paths:
      - outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1
      - outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1
      - .github/workflows/validate-windows-note-sync.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-windows-powershell:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Parse scripts with Windows PowerShell 5.1
        shell: powershell
        run: |
          $scripts = @(
            'outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1',
            'outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1'
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error ("{0}: {1}" -f $script, $_.Message) }
              exit 1
            }
            Write-Host "Windows PowerShell parse OK: $script"
          }
      - name: Verify D drive and DPAPI configuration
        shell: powershell
        run: |
          $installerPath = 'outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1'
          $runtimePath = 'outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1'
          if (-not (Select-String -LiteralPath $installerPath -SimpleMatch "[string]`$DataRoot = 'D:\kaoyandata'" -Quiet)) {
            throw 'D drive default is missing.'
          }
          if (-not (Select-String -LiteralPath $installerPath -SimpleMatch 'github-token.dpapi' -Quiet)) {
            throw 'DPAPI token path is missing.'
          }
          if (-not (Select-String -LiteralPath $runtimePath -SimpleMatch 'credential.helper' -Quiet)) {
            throw 'Credential Manager bypass is missing.'
          }
          $plain = 'test-token'
          $secure = ConvertTo-SecureString $plain -AsPlainText -Force
          $encrypted = $secure | ConvertFrom-SecureString
          $roundTrip = $encrypted | ConvertTo-SecureString
          $pointer = [Runtime.InteropServices.Marshal]::SecureStringToBSTR($roundTrip)
          try {
            $decoded = [Runtime.InteropServices.Marshal]::PtrToStringBSTR($pointer)
            if ($decoded -ne $plain) { throw 'DPAPI token round-trip failed.' }
          } finally {
            [Runtime.InteropServices.Marshal]::ZeroFreeBSTR($pointer)
          }
      - name: Reproduce successful native Git stderr and missing mirror path
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File outputs/kaoyan-schedule-app/scripts/windows-note-folder-sync.ps1 -NativeCommandSelfTest
      - name: Exercise uninstall path safely
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File outputs/kaoyan-schedule-app/scripts/install-note-folder-sync.ps1 -Uninstall
