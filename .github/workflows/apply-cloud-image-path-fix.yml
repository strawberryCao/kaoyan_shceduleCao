name: Apply cloud image path repair

on:
  workflow_dispatch:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - 'outputs/kaoyan-schedule-app/scripts/patch-cloud-image-path.cjs'
      - '.github/workflows/apply-cloud-image-path-fix.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply image path repair
        working-directory: outputs/kaoyan-schedule-app
        run: node scripts/patch-cloud-image-path.cjs

      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Run image path regression test
        working-directory: outputs/kaoyan-schedule-app
        run: node --test scripts/__tests__/cloud-image-path.test.cjs

      - name: Run full automated tests
        working-directory: outputs/kaoyan-schedule-app
        run: npm test

      - name: Build production app
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Commit repaired source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'fix: restore cloud note image paths'
          git push origin HEAD:fix/learning-detail-title-latex
