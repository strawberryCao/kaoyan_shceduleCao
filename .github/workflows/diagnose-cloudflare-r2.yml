name: Diagnose Cloudflare R2

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    if: github.head_ref == 'deploy/cloudflare-production'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json
      - working-directory: outputs/kaoyan-schedule-app
        run: npm ci
      - name: Probe R2 commands
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set +e
          npx wrangler r2 bucket info kaoyan-study-private --json > "$RUNNER_TEMP/r2-info.log" 2>&1
          info_status=$?
          if (( info_status != 0 )); then
            npx wrangler r2 bucket create kaoyan-study-private > "$RUNNER_TEMP/r2-create.log" 2>&1
            create_status=$?
          else
            create_status=0
            echo 'Bucket already exists.' > "$RUNNER_TEMP/r2-create.log"
          fi
          {
            echo '## R2 diagnostic'
            echo
            echo "- info status: $info_status"
            echo "- create status: $create_status"
            echo
            echo '```text'
            cat "$RUNNER_TEMP/r2-info.log"
            cat "$RUNNER_TEMP/r2-create.log"
            echo '```'
          } > "$RUNNER_TEMP/r2-comment.md"
          gh pr comment "${{ github.event.pull_request.number }}" --body-file "$RUNNER_TEMP/r2-comment.md"
          exit "$create_status"
