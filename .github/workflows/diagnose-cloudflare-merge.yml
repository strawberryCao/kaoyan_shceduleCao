name: Diagnose Cloudflare merge

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    if: github.head_ref == 'integration/cloudflare-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/cloudflare-latest
          fetch-depth: 0

      - name: Reproduce and trace merge
        id: trace
        continue-on-error: true
        shell: bash
        run: |
          exec > >(tee "$RUNNER_TEMP/merge-trace.log") 2>&1
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin backup/pre-cloudflare-7c9e92d
          OLD_REF=origin/backup/pre-cloudflare-7c9e92d
          BASE="$(git merge-base HEAD "$OLD_REF")"
          mkdir -p .git/info
          printf '*.cmd -text\n' >> .git/info/attributes
          git reset --hard HEAD
          git status --porcelain=v2

          set +e
          git merge --no-commit --no-ff "$OLD_REF"
          merge_status=$?
          set -e
          mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
          printf 'merge_status=%s\n' "$merge_status"
          printf 'conflict=%s\n' "${conflicts[@]}"

          for file in "${conflicts[@]}"; do
            echo "=== RESOLVE START: $file ==="
            git checkout --ours -- "$file"
            git add -- "$file"
            patch_file="$(mktemp)"
            git diff --binary "$BASE" "$OLD_REF" -- "$file" > "$patch_file"
            wc -c "$patch_file"
            git apply --3way --index --whitespace=nowarn "$patch_file"
            rm -f "$patch_file"
            git diff --check -- "$file" || true
            echo "=== RESOLVE END: $file ==="
          done

          echo '=== UNMERGED ==='
          git diff --name-status --diff-filter=U
          echo '=== STATUS AFTER RESOLUTION ==='
          git status --short

          mapfile -d '' cmd_files < <(git diff --name-only -z "$BASE" "$OLD_REF" -- '*.cmd')
          if (( ${#cmd_files[@]} > 0 )); then
            git restore --source=HEAD --staged --worktree -- "${cmd_files[@]}"
          fi

          intended_files=(
            ".github/workflows/apply-review-ai-data-ui-final.yml"
            "outputs/kaoyan-schedule-app/scripts/ai-router.cjs"
            "outputs/kaoyan-schedule-app/scripts/learning-data-store.cjs"
            "outputs/kaoyan-schedule-app/scripts/note-ai-analyzer.cjs"
            "outputs/kaoyan-schedule-app/scripts/note-server.cjs"
            "outputs/kaoyan-schedule-app/scripts/organize-notes.cjs"
            "outputs/kaoyan-schedule-app/scripts/review-github-sync.cjs"
            "outputs/kaoyan-schedule-app/src/ai-config.css"
            "outputs/kaoyan-schedule-app/src/components/AiConfigPage.tsx"
            "outputs/kaoyan-schedule-app/src/components/LearningCenter.tsx"
            "outputs/kaoyan-schedule-app/src/learning-center.css"
            "outputs/kaoyan-schedule-app/src/utils/aiConfig.ts"
            "outputs/kaoyan-schedule-app/src/utils/learningData.ts"
          )
          for file in "${intended_files[@]}"; do
            [[ -e "$file" ]] || { echo "MISSING INTENDED FILE: $file"; exit 41; }
          done
          git add -- "${intended_files[@]}"
          echo '=== CACHED FILES ==='
          git diff --cached --name-status
          git commit -m "diagnostic merge commit"
          echo '=== DIAGNOSTIC COMMIT CREATED ==='
          git show --stat --oneline --summary HEAD

      - name: Post focused trace
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo "## Cloudflare 合并精确轨迹"
            echo
            echo "trace outcome: ${{ steps.trace.outcome }}"
            echo
            echo '```text'
            tail -n 180 "$RUNNER_TEMP/merge-trace.log" 2>/dev/null || true
            echo '```'
          } > "$RUNNER_TEMP/trace-comment.md"
          gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/trace-comment.md"
          [[ "${{ steps.trace.outcome }}" == success ]]
