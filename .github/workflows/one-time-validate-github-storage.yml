name: One-time validate GitHub storage

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    if: github.head_ref == 'feature/github-cloud-storage'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/github-cloud-storage
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json
      - name: Apply compatibility patches
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f scripts/apply-github-storage-patches.cjs ]]; then
            set +e
            node scripts/apply-github-storage-patches.cjs > "$RUNNER_TEMP/storage-patch.log" 2>&1
            status=$?
            set -e
            if (( status != 0 )); then
              {
                echo '## GitHub storage compatibility patch failed'
                echo
                echo '```text'
                cat "$RUNNER_TEMP/storage-patch.log"
                echo '```'
              } > "$RUNNER_TEMP/storage-patch-comment.md"
              gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/storage-patch-comment.md"
              cat "$RUNNER_TEMP/storage-patch-comment.md"
              exit "$status"
            fi
            rm scripts/apply-github-storage-patches.cjs
          fi
      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci
      - name: Test, build, and validate Worker
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set +e
          mapfile -d '' test_files < <(find cloudflare scripts -type f \( -name '*.test.cjs' -o -name '*.test.mjs' \) -print0 | sort -z)
          node --test "${test_files[@]}" > "$RUNNER_TEMP/storage-validation.log" 2>&1
          test_status=$?
          if (( test_status == 0 )); then
            npm run build >> "$RUNNER_TEMP/storage-validation.log" 2>&1
            build_status=$?
          else
            build_status=1
          fi
          if (( test_status == 0 && build_status == 0 )); then
            npx wrangler deploy --dry-run >> "$RUNNER_TEMP/storage-validation.log" 2>&1
            wrangler_status=$?
          else
            wrangler_status=1
          fi
          set -e
          if (( test_status != 0 || build_status != 0 || wrangler_status != 0 )); then
            {
              echo '## GitHub storage migration validation failed'
              echo
              echo '```text'
              grep -nE 'not ok|failureType|error:|expected:|actual:|AssertionError|ERR_|TS[0-9]{4}' "$RUNNER_TEMP/storage-validation.log" | tail -n 140 || true
              echo
              echo '--- last 240 lines ---'
              tail -n 240 "$RUNNER_TEMP/storage-validation.log"
              echo '```'
            } > "$RUNNER_TEMP/storage-comment.md"
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/storage-comment.md"
            exit 1
          fi
          tail -n 100 "$RUNNER_TEMP/storage-validation.log"
      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            outputs/kaoyan-schedule-app/cloudflare/learning.js \
            outputs/kaoyan-schedule-app/cloudflare/worker.js
          git rm -f --ignore-unmatch outputs/kaoyan-schedule-app/scripts/apply-github-storage-patches.cjs
          git rm -f --ignore-unmatch .github/github-storage-trigger.txt
          if ! git diff --cached --quiet; then
            git commit -m 'refactor: finalize GitHub-backed cloud storage'
            git push origin HEAD:feature/github-cloud-storage
          fi
          gh pr comment "$PR_NUMBER" --body 'GitHub storage migration validation succeeded: automated tests, production build, and Wrangler dry-run all passed.'
