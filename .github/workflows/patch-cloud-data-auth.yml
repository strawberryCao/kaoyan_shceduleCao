name: Apply cloud data authentication patch

on:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - 'outputs/kaoyan-schedule-app/scripts/patch-cloud-data-auth.cjs'
      - '.github/workflows/patch-cloud-data-auth.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Patch cloud API authentication
        working-directory: outputs/kaoyan-schedule-app
        run: node scripts/patch-cloud-data-auth.cjs
      - name: Commit patched worker
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add outputs/kaoyan-schedule-app/cloudflare/worker.js
          git commit -m 'security: require password for cloud data APIs'
          git push origin HEAD:fix/learning-detail-title-latex
