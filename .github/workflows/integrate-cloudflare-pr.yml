name: Validate Cloudflare integration PR

on:
  pull_request:
    branches:
      - fix/learning-detail-title-latex
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: validate-cloudflare-integration-pr
  cancel-in-progress: false

jobs:
  integrate:
    if: github.head_ref == 'integration/cloudflare-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/cloudflare-latest
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json

      - name: Merge missing history and reapply overlapping changes
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin backup/pre-cloudflare-7c9e92d
          OLD_REF="origin/backup/pre-cloudflare-7c9e92d"

          if git merge-base --is-ancestor "$OLD_REF" HEAD; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "The pre-Cloudflare history is already present."
            exit 0
          fi
          echo "needed=true" >> "$GITHUB_OUTPUT"

          BASE="$(git merge-base HEAD "$OLD_REF")"
          set +e
          git merge --no-commit --no-ff "$OLD_REF"
          merge_status=$?
          set -e

          mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
          expected_conflicts=(
            "outputs/kaoyan-schedule-app/scripts/learning-data-store.cjs"
            "outputs/kaoyan-schedule-app/scripts/note-server.cjs"
            "outputs/kaoyan-schedule-app/scripts/organize-notes.cjs"
            "outputs/kaoyan-schedule-app/src/components/LearningCenter.tsx"
            "outputs/kaoyan-schedule-app/src/learning-center.css"
            "outputs/kaoyan-schedule-app/src/utils/learningData.ts"
          )

          if (( merge_status != 0 )); then
            for file in "${conflicts[@]}"; do
              expected=false
              for allowed in "${expected_conflicts[@]}"; do
                if [[ "$file" == "$allowed" ]]; then expected=true; break; fi
              done
              if [[ "$expected" != true ]]; then
                echo "Unexpected merge conflict: $file" >&2
                exit 1
              fi
            done
          fi

          for file in "${conflicts[@]}"; do
            echo "Resolving $file from Cloudflare version plus later feature patch"
            git checkout --ours -- "$file"
            git add -- "$file"
            patch_file="$(mktemp)"
            git diff --binary "$BASE" "$OLD_REF" -- "$file" > "$patch_file"
            if [[ -s "$patch_file" ]]; then
              git apply --3way --index --whitespace=nowarn "$patch_file"
            fi
            rm -f "$patch_file"
          done

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [[ -n "$unresolved" ]]; then
            echo "Unresolved conflicts remain:" >&2
            echo "$unresolved" >&2
            exit 1
          fi
          git diff --check
          git status --short

      - name: Install dependencies
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Run complete Node test suite
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set +e
          node --test > "$RUNNER_TEMP/node-test.log" 2>&1
          test_status=$?
          set -e
          if (( test_status != 0 )); then
            {
              echo "## Cloudflare 整合测试失败"
              echo
              echo "以下是 Node 测试输出的最后 220 行："
              echo
              echo '```text'
              tail -n 220 "$RUNNER_TEMP/node-test.log"
              echo '```'
            } > "$RUNNER_TEMP/test-failure-comment.md"
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/test-failure-comment.md"
            cat "$RUNNER_TEMP/test-failure-comment.md"
            exit "$test_status"
          fi
          tail -n 60 "$RUNNER_TEMP/node-test.log"

      - name: Build production application
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Validate Wrangler deployment bundle
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        run: npx wrangler deploy --dry-run

      - name: Commit and push validated merge
        if: steps.merge.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "merge: restore pre-cloudflare history [history-integrated]"
          git push origin HEAD:integration/cloudflare-latest
