name: Validate Cloudflare integration PR

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: validate-cloudflare-integration-pr
  cancel-in-progress: false

jobs:
  integrate:
    if: github.head_ref == 'integration/cloudflare-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/cloudflare-latest
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json

      - name: Merge missing history
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin backup/pre-cloudflare-7c9e92d
          OLD_REF=origin/backup/pre-cloudflare-7c9e92d

          if git merge-base --is-ancestor "$OLD_REF" HEAD; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "needed=true" >> "$GITHUB_OUTPUT"

          mkdir -p .git/info
          printf '*.cmd -text\n' >> .git/info/attributes
          git reset --hard HEAD
          PRE_MERGE_HEAD="$(git rev-parse HEAD)"

          git merge -X ours --no-commit --no-ff "$OLD_REF"

          mapfile -d '' cmd_files < <(git diff --name-only -z "$PRE_MERGE_HEAD" "$OLD_REF" -- '*.cmd')
          if (( ${#cmd_files[@]} > 0 )); then
            git restore --source="$PRE_MERGE_HEAD" --staged --worktree -- "${cmd_files[@]}"
          fi

          git rm -f --ignore-unmatch \
            .github/workflows/integrate-cloudflare-history.yml \
            .github/integration-cloudflare-trigger.txt \
            .github/integration-cloudflare-pr-trigger.txt

          assert_contains() {
            local file="$1"
            local text="$2"
            grep -Fq "$text" "$file" || {
              echo "Missing merged capability '$text' in $file" >&2
              exit 42
            }
          }

          assert_contains outputs/kaoyan-schedule-app/scripts/learning-data-store.cjs 'wrongReasonSource'
          assert_contains outputs/kaoyan-schedule-app/scripts/learning-data-store.cjs 'wrongReasonConfidence'
          assert_contains outputs/kaoyan-schedule-app/scripts/learning-data-store.cjs 'changedEditableKeys'
          assert_contains outputs/kaoyan-schedule-app/scripts/note-server.cjs 'queueNoteEnrichment'
          assert_contains outputs/kaoyan-schedule-app/scripts/note-server.cjs 'analyze-wrong-reason'
          assert_contains outputs/kaoyan-schedule-app/scripts/note-server.cjs 'reviewSync.startPush()'
          assert_contains outputs/kaoyan-schedule-app/scripts/organize-notes.cjs 'wrongReasonSource'
          assert_contains outputs/kaoyan-schedule-app/scripts/organize-notes.cjs 'targetNoteUid'
          assert_contains outputs/kaoyan-schedule-app/src/utils/learningData.ts 'wrongReasonSource: string'
          assert_contains outputs/kaoyan-schedule-app/src/utils/learningData.ts 'wrongReasonConfidence: number | null'
          assert_contains outputs/kaoyan-schedule-app/src/utils/aiConfig.ts 'analyzeLearningNoteWrongReason'
          assert_contains outputs/kaoyan-schedule-app/src/components/LearningCenter.tsx 'wrongReasonEditor'
          assert_contains outputs/kaoyan-schedule-app/src/components/LearningCenter.tsx 'analyzeLearningNoteWrongReason'
          assert_contains outputs/kaoyan-schedule-app/src/learning-center.css '.lc-wrong-reason-fact'

          if [[ -n "$(git diff --name-only --diff-filter=U)" ]]; then
            git diff --name-status --diff-filter=U
            exit 43
          fi

          git status --short
          git diff --cached --stat
          git commit -m "merge: restore pre-cloudflare history [history-integrated]"

      - name: Install dependencies
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Run automated Node test suite
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' test_files < <(find cloudflare scripts -type f \( -name '*.test.cjs' -o -name '*.test.mjs' \) -print0 | sort -z)
          (( ${#test_files[@]} > 0 ))
          node --test "${test_files[@]}"

      - name: Build production application
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Validate Wrangler deployment bundle
        if: steps.merge.outputs.needed == 'true'
        working-directory: outputs/kaoyan-schedule-app
        run: npx wrangler deploy --dry-run

      - name: Push validated integration
        if: steps.merge.outputs.needed == 'true'
        shell: bash
        run: git push origin HEAD:integration/cloudflare-latest
