name: Validate GitHub cloud storage migration

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: validate-github-cloud-storage
  cancel-in-progress: false

jobs:
  validate:
    if: github.head_ref == 'feature/github-cloud-storage'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/github-cloud-storage
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json
      - name: Apply deterministic compatibility patches
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f scripts/apply-github-storage-patches.cjs ]]; then
            node scripts/apply-github-storage-patches.cjs
            rm scripts/apply-github-storage-patches.cjs
          fi
      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci
      - name: Run automated tests
        working-directory: outputs/kaoyan-schedule-app
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' test_files < <(find cloudflare scripts -type f \( -name '*.test.cjs' -o -name '*.test.mjs' \) -print0 | sort -z)
          (( ${#test_files[@]} > 0 ))
          set +e
          node --test "${test_files[@]}" > "$RUNNER_TEMP/github-storage-tests.log" 2>&1
          status=$?
          set -e
          if (( status != 0 )); then
            {
              echo '## GitHub storage migration tests failed'
              echo
              echo '```text'
              grep -nE 'not ok|failureType|error:|expected:|actual:|AssertionError|ERR_' "$RUNNER_TEMP/github-storage-tests.log" | tail -n 120 || true
              echo
              echo '--- last 220 lines ---'
              tail -n 220 "$RUNNER_TEMP/github-storage-tests.log"
              echo '```'
            } > "$RUNNER_TEMP/github-storage-test-comment.md"
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/github-storage-test-comment.md"
            cat "$RUNNER_TEMP/github-storage-test-comment.md"
            exit "$status"
          fi
          tail -n 80 "$RUNNER_TEMP/github-storage-tests.log"
      - name: Build production app
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build
      - name: Validate Worker bundle
        working-directory: outputs/kaoyan-schedule-app
        run: npx wrangler deploy --dry-run
      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            outputs/kaoyan-schedule-app/cloudflare/learning.js \
            outputs/kaoyan-schedule-app/cloudflare/worker.js
          git rm -f --ignore-unmatch outputs/kaoyan-schedule-app/scripts/apply-github-storage-patches.cjs
          if git diff --cached --quiet; then
            echo 'No compatibility patch changes to commit.'
          else
            git commit -m 'refactor: finalize GitHub-backed cloud storage'
            git push origin HEAD:feature/github-cloud-storage
          fi
