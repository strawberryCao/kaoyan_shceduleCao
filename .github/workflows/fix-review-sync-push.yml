name: Fix review sync push race

on:
  push:
    branches:
      - fix/learning-detail-title-latex
    paths:
      - .github/review-sync-fix-trigger

permissions:
  contents: write

concurrency:
  group: fix-review-sync-push-race
  cancel-in-progress: false

jobs:
  patch-build-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0

      - name: Add non-fast-forward retry
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('outputs/kaoyan-schedule-app/scripts/review-github-sync.cjs')
          text = path.read_text(encoding='utf-8')

          anchor = """  return clean(result.stdout, 10000);\n}\n\nfunction taskSettings(configPath) {\n"""
          helper = """  return clean(result.stdout, 10000);\n}\n\nfunction isRemoteAdvanceError(error) {\n  return /(?:\\[rejected\\]|fetch first|non-fast-forward|failed to push some refs)/i.test(\n    error instanceof Error ? error.message : String(error),\n  );\n}\n\nfunction pushWithRemoteRefresh(cwd, branch) {\n  let lastError = null;\n  for (let attempt = 0; attempt < 4; attempt += 1) {\n    if (attempt > 0) {\n      runGit(['fetch', 'origin', branch], { cwd, timeout: 180000 });\n      try {\n        runGit(['rebase', `origin/${branch}`], { cwd, timeout: 180000 });\n      } catch (error) {\n        try { runGit(['rebase', '--abort'], { cwd }); } catch {}\n        throw error;\n      }\n    }\n    try {\n      runGit(['push', 'origin', `HEAD:${branch}`], { cwd, timeout: 180000 });\n      return;\n    } catch (error) {\n      lastError = error;\n      if (!isRemoteAdvanceError(error) || attempt === 3) throw error;\n    }\n  }\n  throw lastError || new Error('Git 推送重试失败');\n}\n\nfunction taskSettings(configPath) {\n"""
          if text.count(anchor) != 1:
              raise SystemExit(f'helper anchor count: {text.count(anchor)}')
          text = text.replace(anchor, helper, 1)

          old = "    runGit(['push', 'origin', `HEAD:${settings.branch}`], { cwd: workingRoot, timeout: 180000 });"
          new = "    pushWithRemoteRefresh(workingRoot, settings.branch);"
          if text.count(old) != 1:
              raise SystemExit(f'push call count: {text.count(old)}')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Syntax checks
        working-directory: outputs/kaoyan-schedule-app
        run: |
          node --check scripts/review-github-sync.cjs
          node --check scripts/note-server.cjs

      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Type-check and build
        working-directory: outputs/kaoyan-schedule-app
        run: npm run build

      - name: Commit validated fix
        run: |
          rm -f .github/workflows/fix-review-sync-push.yml
          rm -f .github/review-sync-fix-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/kaoyan-schedule-app/scripts/review-github-sync.cjs .github
          git commit -m "fix: retry review data push after remote PDF updates"
          git push origin HEAD:fix/learning-detail-title-latex
