name: Inspect review API test

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  inspect:
    if: github.head_ref == 'integration/cloudflare-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/cloudflare-latest
          fetch-depth: 1
          persist-credentials: true

      - name: Persist exact test source on integration branch
        shell: bash
        run: |
          set -euo pipefail
          title='review API is durable, idempotent, conflict guarded, and never reports file failures as success'
          match="$(grep -RFl --include='*.test.cjs' --include='*.test.mjs' "$title" outputs/kaoyan-schedule-app || true)"
          if [[ -z "$match" ]]; then
            echo "Exact test title not found" >&2
            exit 1
          fi
          line="$(grep -nF "$title" "$match" | head -n1 | cut -d: -f1)"
          start=$(( line > 40 ? line - 40 : 1 ))
          end=$(( line + 220 ))
          output=.github/review-api-test-source.txt
          {
            echo "FILE=$match"
            echo "TITLE_LINE=$line"
            echo "SOURCE_RANGE=${start}-${end}"
            sed -n "${start},${end}p" "$match"
          } > "$output"
          if git diff --quiet -- "$output" && git ls-files --error-unmatch "$output" >/dev/null 2>&1; then
            echo "Diagnostic source is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$output"
          git commit -m "ci: persist review API test source"
          git push origin HEAD:integration/cloudflare-latest
