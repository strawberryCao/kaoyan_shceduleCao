name: Inspect review API test

on:
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  inspect:
    if: github.head_ref == 'integration/cloudflare-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/cloudflare-latest
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json

      - name: Reproduce exact failure on merged tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin backup/pre-cloudflare-7c9e92d
          OLD_REF=origin/backup/pre-cloudflare-7c9e92d
          PRE_HEAD="$(git rev-parse HEAD)"
          mkdir -p .git/info
          printf '*.cmd -text\n' >> .git/info/attributes
          git reset --hard "$PRE_HEAD"
          git merge -X ours --no-commit --no-ff "$OLD_REF"

          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one target, found {count}')
              file_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'outputs/kaoyan-schedule-app/scripts/note-ai-analyzer.cjs',
              "    'wrongReason',\n    'wrongReasonSource',\n    'wrongReasonConfidence',\n    'intent',",
              "    'wrongReason',\n    'intent',",
          )
          replace_once(
              'outputs/kaoyan-schedule-app/scripts/note-server.cjs',
              "  if (!metadata || metadata.noteUid !== noteUid || typeof filePath !== 'string' || !fs.existsSync(filePath)) {\n    return null;\n  }",
              "  if (!metadata || metadata.noteUid !== noteUid || typeof filePath !== 'string') {\n    return null;\n  }\n  const fileExists = fs.existsSync(filePath);\n  const namingInFlight = metadata.naming?.status === 'pending' && receipt.aiStatus === 'pending';\n  if (!fileExists && !namingInFlight) {\n    return null;\n  }",
          )
          replace_once(
              'outputs/kaoyan-schedule-app/scripts/note-server.cjs',
              "function findSavedNote(noteUid) {\n  const saved = readSaveReceipt(noteUid);\n  if (saved || !fs.existsSync(NOTES_ROOT)) return saved;",
              "function findSavedNote(noteUid) {\n  const saved = readSaveReceipt(noteUid);\n  if (saved && fs.existsSync(saved.filePath)) return saved;\n  if (!fs.existsSync(NOTES_ROOT)) return saved;",
          )
          replace_once(
              'outputs/kaoyan-schedule-app/scripts/note-server.cjs',
              "    }\n  }\n  return null;\n}\n\nfunction findLearningNote(snapshot, noteUid) {",
              "    }\n  }\n  return saved;\n}\n\nfunction findLearningNote(snapshot, noteUid) {",
          )
          PY

          npm ci --prefix outputs/kaoyan-schedule-app
          set +e
          (
            cd outputs/kaoyan-schedule-app
            node --test scripts/__tests__/note-save-flow.test.cjs
          ) > "$RUNNER_TEMP/review-api-test-output.txt" 2>&1
          test_status=$?
          set -e

          git reset --hard "$PRE_HEAD"
          output=.github/review-api-test-output.txt
          {
            echo "TEST_STATUS=$test_status"
            echo "PRE_HEAD=$PRE_HEAD"
            cat "$RUNNER_TEMP/review-api-test-output.txt"
          } > "$output"
          if git diff --quiet -- "$output" && git ls-files --error-unmatch "$output" >/dev/null 2>&1; then
            echo "Diagnostic output is unchanged."
            exit 0
          fi
          git add "$output"
          git commit -m "ci: persist merged review API test output"
          git push origin HEAD:integration/cloudflare-latest
