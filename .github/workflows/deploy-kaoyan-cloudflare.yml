name: Deploy kaoyan study center to Cloudflare

on:
  workflow_dispatch:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - 'outputs/kaoyan-schedule-app/**'
      - '.github/workflows/deploy-kaoyan-cloudflare.yml'
  pull_request:
    branches: [fix/learning-detail-title-latex]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: kaoyan-cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.head_ref == 'deploy/cloudflare-production'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      KAOYAN_APP_PASSWORD: ${{ secrets.KAOYAN_APP_PASSWORD }}
      CAOBIJI_GITHUB_TOKEN: ${{ secrets.CAOBIJI_GITHUB_TOKEN }}
      APP_USERNAME: caobiji
      WORKER_NAME: kaoyan-study-center
      DATA_REPOSITORY: strawberryCao/Caobijidata
      DATA_BRANCH: main

    steps:
      - name: Check out deployment source
        uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outputs/kaoyan-schedule-app/package-lock.json

      - name: Verify protected deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$CLOUDFLARE_API_TOKEN" ]] || { echo 'CLOUDFLARE_API_TOKEN is missing' >&2; exit 2; }
          [[ -n "$CLOUDFLARE_ACCOUNT_ID" ]] || { echo 'CLOUDFLARE_ACCOUNT_ID is missing' >&2; exit 2; }
          [[ -n "$KAOYAN_APP_PASSWORD" ]] || { echo 'KAOYAN_APP_PASSWORD is missing' >&2; exit 2; }
          [[ -n "$CAOBIJI_GITHUB_TOKEN" ]] || { echo 'CAOBIJI_GITHUB_TOKEN is missing' >&2; exit 2; }
          echo 'Cloudflare credentials, app password, and GitHub storage token are configured.'

      - name: Verify GitHub storage access
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $CAOBIJI_GITHUB_TOKEN" \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$DATA_REPOSITORY/git/ref/heads/$DATA_BRANCH" \
            > "$RUNNER_TEMP/github-ref.json"
          node -e "const v=require(process.argv[1]); if(!/^[a-f0-9]{40}$/i.test(v?.object?.sha||'')) process.exit(1);" "$RUNNER_TEMP/github-ref.json"
          echo 'GitHub repository access verified.'

      - name: Install dependencies
        working-directory: outputs/kaoyan-schedule-app
        run: npm ci

      - name: Run automated tests
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        env:
          CAOBIJI_GITHUB_TOKEN: ''
        run: |
          set -euo pipefail
          mapfile -d '' test_files < <(find cloudflare scripts -type f \( -name '*.test.cjs' -o -name '*.test.mjs' \) -print0 | sort -z)
          (( ${#test_files[@]} > 0 ))
          node --test "${test_files[@]}"

      - name: Validate Windows synchronization scripts
        working-directory: outputs/kaoyan-schedule-app
        shell: pwsh
        run: |
          $failed = $false
          foreach ($file in @(
            'scripts/windows-note-folder-sync.ps1',
            'scripts/windows-assistant-config-sync.ps1',
            'scripts/install-note-folder-sync.ps1'
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if (@($errors).Count -gt 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$file : $($_.Message)" }
            }
          }
          if ($failed) { exit 1 }

      - name: Build and validate Worker bundle
        working-directory: outputs/kaoyan-schedule-app
        run: |
          npm run build
          npx wrangler deploy --dry-run

      - name: Verify Cloudflare authentication
        working-directory: outputs/kaoyan-schedule-app
        run: npx wrangler whoami

      - name: Deploy Worker
        id: deploy
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy 2>&1 | tee "$RUNNER_TEMP/wrangler-deploy.log"
          worker_url="$(grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev' "$RUNNER_TEMP/wrangler-deploy.log" | tail -n 1 || true)"
          [[ -n "$worker_url" ]] || {
            echo 'Unable to determine workers.dev URL from Wrangler output.' >&2
            tail -n 80 "$RUNNER_TEMP/wrangler-deploy.log" >&2
            exit 3
          }
          echo "worker_url=$worker_url" >> "$GITHUB_OUTPUT"
          echo "Worker URL: $worker_url"

      - name: Configure Worker secrets
        working-directory: outputs/kaoyan-schedule-app
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$KAOYAN_APP_PASSWORD" | npx wrangler secret put APP_PASSWORD
          printf '%s' "$CAOBIJI_GITHUB_TOKEN" | npx wrangler secret put GITHUB_TOKEN

      - name: Bootstrap and verify GitHub-backed learning center
        id: verify
        shell: bash
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          auth_header="Basic $(printf '%s' "$APP_USERNAME:$KAOYAN_APP_PASSWORD" | base64 -w0)"

          for attempt in {1..12}; do
            health_status="$(curl --silent --show-error -o "$RUNNER_TEMP/health.json" -w '%{http_code}' "$WORKER_URL/api/health" || true)"
            if [[ "$health_status" == "200" ]] && node -e "const v=require(process.argv[1]); if(!v.ok||v.storage!=='github'||!v.githubConfigured||v.repository!=='strawberryCao/Caobijidata'||!v.aiConfigured||v.d1Bound||v.r2Bound) process.exit(1);" "$RUNNER_TEMP/health.json"; then
              break
            fi
            echo "Health attempt $attempt returned HTTP $health_status"
            sleep 5
          done
          node -e "const v=require(process.argv[1]); if(!v.ok||v.storage!=='github'||!v.githubConfigured||!v.aiConfigured) process.exit(1);" "$RUNNER_TEMP/health.json"

          bootstrap_ok=0
          for attempt in {1..12}; do
            bootstrap_status="$(curl --silent --show-error -o "$RUNNER_TEMP/bootstrap.json" -w '%{http_code}' -X POST -H "Authorization: $auth_header" "$WORKER_URL/api/admin/bootstrap" || true)"
            if [[ "$bootstrap_status" =~ ^2[0-9][0-9]$ ]]; then
              bootstrap_ok=1
              break
            fi
            echo "Bootstrap attempt $attempt returned HTTP $bootstrap_status"
            head -c 3000 "$RUNNER_TEMP/bootstrap.json" || true
            echo
            sleep 5
          done
          if (( bootstrap_ok == 0 )); then
            {
              echo '## GitHub-backed bootstrap failed'
              echo
              echo "- Worker URL: $WORKER_URL"
              echo "- Last HTTP status: $bootstrap_status"
              echo '```json'
              head -c 6000 "$RUNNER_TEMP/bootstrap.json" || true
              echo
              echo '```'
            } > "$RUNNER_TEMP/bootstrap-failure.md"
            if [[ -n "$PR_NUMBER" ]]; then
              gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/bootstrap-failure.md"
            fi
            exit 1
          fi

          learning_ok=0
          for attempt in {1..12}; do
            learning_status="$(curl --silent --show-error -o "$RUNNER_TEMP/learning-data.json" -w '%{http_code}' -H "Authorization: $auth_header" "$WORKER_URL/api/learning-data" || true)"
            if [[ "$learning_status" == "200" ]]; then
              learning_ok=1
              break
            fi
            echo "Learning-data attempt $attempt returned HTTP $learning_status"
            sleep 5
          done
          if (( learning_ok == 0 )); then
            {
              echo '## Learning-data verification failed'
              echo
              echo "- Worker URL: $WORKER_URL"
              echo "- Last HTTP status: $learning_status"
              echo '```json'
              head -c 6000 "$RUNNER_TEMP/learning-data.json" || true
              echo
              echo '```'
            } > "$RUNNER_TEMP/learning-failure.md"
            if [[ -n "$PR_NUMBER" ]]; then
              gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/learning-failure.md"
            fi
            exit 1
          fi

          curl --fail --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $CAOBIJI_GITHUB_TOKEN" \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "https://api.github.com/repos/$DATA_REPOSITORY/contents/data/cloud/learning-data.json?ref=$DATA_BRANCH" \
            > "$RUNNER_TEMP/github-learning-file.json"

          node <<'NODE'
          const fs = require('node:fs');
          const bootstrap = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bootstrap.json', 'utf8'));
          const snapshot = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/learning-data.json', 'utf8'));
          const githubFile = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/github-learning-file.json', 'utf8'));
          const notes = Object.values(snapshot.days || {}).reduce((total, day) => total + (Array.isArray(day.autoNotes) ? day.autoNotes.length : 0), 0);
          const cards = Array.isArray(snapshot.cards) ? snapshot.cards.length : 0;
          if (!bootstrap.ok || notes < 1 || cards < 1 || !githubFile.sha) {
            throw new Error(`GitHub bootstrap verification failed: notes=${notes}, cards=${cards}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `notes=${notes}\ncards=${cards}\nrevision=${snapshot.revision}\n`);
          console.log(`Verified GitHub-backed learning center: ${notes} notes, ${cards} cards, revision ${snapshot.revision}.`);
          NODE

      - name: Publish deployment summary
        if: always()
        shell: bash
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
          NOTES: ${{ steps.verify.outputs.notes }}
          CARDS: ${{ steps.verify.outputs.cards }}
          REVISION: ${{ steps.verify.outputs.revision }}
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Cloudflare production deployment'
            echo
            if [[ "${{ job.status }}" == 'success' ]]; then
              echo '- Status: success'
              echo "- URL: $WORKER_URL"
              echo "- Login username: $APP_USERNAME"
              echo "- Learning notes: $NOTES"
              echo "- Review cards: $CARDS"
              echo "- GitHub data revision: $REVISION"
              echo '- Workers AI: configured'
              echo "- Storage: $DATA_REPOSITORY ($DATA_BRANCH), no D1 or R2"
            else
              echo '- Status: failed'
              echo "- Worker URL: $WORKER_URL"
              echo '- Inspect the diagnostic comment; no credential values were logged.'
            fi
          } | tee "$RUNNER_TEMP/deployment-summary.md" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body-file "$RUNNER_TEMP/deployment-summary.md"
          fi
