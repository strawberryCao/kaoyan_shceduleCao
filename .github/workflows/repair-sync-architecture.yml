name: Repair synchronized architecture sources

on:
  push:
    branches: [fix/learning-detail-title-latex]
    paths:
      - 'outputs/kaoyan-schedule-app/scripts/repair-sync-architecture.cjs'
      - '.github/workflows/repair-sync-architecture.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-sync-architecture
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/learning-detail-title-latex
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply scoped repairs
        working-directory: outputs/kaoyan-schedule-app
        run: node scripts/repair-sync-architecture.cjs
      - name: Commit repaired source
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Repairs already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add outputs/kaoyan-schedule-app/scripts/ai-router.cjs \
            outputs/kaoyan-schedule-app/cloudflare/learning.js \
            outputs/kaoyan-schedule-app/src/utils/learningData.ts
          git commit -m 'fix: repair AI task registration and mirrored note metadata'
          git push origin HEAD:fix/learning-detail-title-latex
